<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件转 Data URI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #007bff; background: #f8f9fa; }
        .upload-area input { display: none; }
        .upload-icon { font-size: 3rem; margin-bottom: 12px; }
        .btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; border: none; font-size: 14px; margin-right: 8px; margin-top: 12px; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-green { background: #28a745; color: #fff; }
        .btn-gray { background: #6c757d; color: #fff; }
        .code-output { background: #f5f5f5; padding: 16px; border-radius: 4px; font-family: monospace; font-size: 12px; word-break: break-all; max-height: 200px; overflow: auto; white-space: pre-wrap; }
        .file-info { margin-top: 12px; padding: 12px; background: #f5f5f5; border-radius: 4px; }
        .file-info div { margin: 4px 0; }
        .preview-img { max-width: 100%; max-height: 200px; margin: 12px auto; display: block; }
        .mimetype-select { margin-bottom: 12px; }
        .info { font-size: 13px; color: #666; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>文件转 Data URI</h1>
        <div class="card">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📁</div>
                <div>点击上传任意文件</div>
                <div style="font-size:12px;color:#666;margin-top:8px;">支持任意文件类型</div>
                <input type="file" id="fileInput" onchange="handleFile(this.files[0])">
            </div>
        </div>
        <div class="card" id="resultCard" style="display:none;">
            <label>文件信息</label>
            <div class="file-info" id="fileInfo"></div>
            <img id="preview" class="preview-img" style="display:none;">
        </div>
        <div class="card" id="uriCard" style="display:none;">
            <label>MIME 类型</label>
            <div class="mimetype-select">
                <input type="text" id="mimeType" style="width:100%;padding:10px;border:1px solid #ddd;border-radius:4px;">
            </div>
            <label>Data URI</label>
            <div class="code-output" id="uriOutput"></div>
            <button class="btn btn-blue" onclick="copyUri()">复制 URI</button>
            <button class="btn btn-green" onclick="downloadUri()">下载为文件</button>
            <button class="btn btn-gray" onclick="useAsImg()">作为图片使用</button>
        </div>
        <div class="card" id="imgPreviewCard" style="display:none;">
            <label>预览效果</label>
            <div style="padding:16px;background:#f5f5f5;border-radius:4px;">
                <img id="previewImg" style="max-width:100%;max-height:300px;">
            </div>
        </div>
        <div class="card">
            <div class="info">
                <strong>使用说明：</strong><br>
                Data URI 可以将文件内容直接嵌入 HTML/CSS/JS 中，减少 HTTP 请求。<br>
                格式：data:[MIME类型];base64,[Base64编码内容]
            </div>
        </div>
    </div>
    <script>
        let currentFile = null;
        let currentUri = '';
        
        function handleFile(file) {
            if (!file) return;
            currentFile = file;
            
            document.getElementById('fileInfo').innerHTML = `
                <div><strong>文件名：</strong>${file.name}</div>
                <div><strong>类型：</strong>${file.type || 'unknown'}</div>
                <div><strong>大小：</strong>${formatBytes(file.size)}</div>
            `;
            document.getElementById('mimeType').value = file.type || 'application/octet-stream';
            
            // Show preview for images
            if (file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').src = e.target.result;
                    document.getElementById('preview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                document.getElementById('preview').style.display = 'none';
            }
            
            // Convert to base64
            const reader = new FileReader();
            reader.onload = function(e) {
                currentUri = e.target.result;
                document.getElementById('uriOutput').textContent = currentUri;
                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('uriCard').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }
        
        function copyUri() {
            navigator.clipboard.writeText(currentUri).then(() => {
                const btn = event.target;
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制 URI', 1500);
            });
        }
        
        function downloadUri() {
            const a = document.createElement('a');
            a.href = currentUri;
            a.download = currentFile.name + '.datauri.txt';
            a.click();
        }
        
        function useAsImg() {
            if (!currentFile || !currentFile.type.startsWith('image/')) {
                alert('只有图片文件可以作为 img 使用');
                return;
            }
            document.getElementById('previewImg').src = currentUri;
            document.getElementById('imgPreviewCard').style.display = 'block';
        }
    </script>
</body>
</html>
